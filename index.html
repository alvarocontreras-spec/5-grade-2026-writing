<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <style>
        #wordCounter {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <textarea id="textArea" rows="10" cols="50" placeholder="Type your text here..."></textarea>
    <div id="wordCounter">Word Count: 0</div>

    <script>
        function countWords(text) {
            return text.trim().split(/\s+/).filter(function(word) { return word.length > 0; }).length;
        }

        const textArea = document.getElementById('textArea');
        const wordCounter = document.getElementById('wordCounter');

        textArea.addEventListener('input', function() {
            const wordCount = countWords(textArea.value);
            wordCounter.textContent = 'Word Count: ' + wordCount;
        });
    </script>
</body>
</html>
