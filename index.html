<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Task A2-B1</title>

<style>
:root {
    --primary: #2980b9;
    --success: #27ae60;
    --error: #e74c3c;
    --warning: #f39c12;
    --bg: #f4f7f6;
    --text: #2c3e50;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background-color: var(--bg);
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    max-width: 850px;
    width: 100%;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

header { text-align: center; margin-bottom: 25px; }

.instruction-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 20px;
}

.box { padding: 15px; border-radius: 10px; font-size: 0.85rem; }
.instructions { background: #fff9db; border: 1px solid #f1c40f; }
.vocabulary { background: #e8f8f5; border: 1px solid #2ecc71; }
.model { background: #fdf2e9; border: 1px solid #e67e22; grid-column: span 2; }

textarea {
    width: 100%;
    height: 220px;
    padding: 20px;
    font-size: 1.1rem;
    border-radius: 12px;
    border: 2px solid #ddd;
}

.word-counter {
    margin-top: 5px;
    font-size: 0.8rem;
}

.btn-submit {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#feedbackArea {
    display: none;
    margin-top: 25px;
    padding: 20px;
    border: 2px solid #ddd;
    border-radius: 12px;
}

.tag-error { color: var(--error); }
.tag-success { color: var(--success); }
</style>
</head>

<body>

<div class="container">

<header>
    <h1>Writing Assessment: Daily Routine</h1>
    <p>A2–B1 Automatic Evaluation</p>
</header>

<div class="instruction-grid">
    <div class="box instructions">
        <strong>Rules:</strong> 40–60 words. Use Present Simple and connectors.
    </div>
    <div class="box vocabulary">
        <strong>Keywords:</strong> wake up, school, lunch, afternoon, happy.
    </div>
    <div class="box model">
        <strong>Do NOT copy:</strong> I go to Mars and eat screws...
    </div>
</div>

<textarea id="writingBox" placeholder="Write your routine..."></textarea>
<div id="counter" class="word-counter">Words: 0</div>

<button class="btn-submit" onclick="analyzeTask()">Submit</button>

<div id="feedbackArea">
    <h2 id="overallStatus"></h2>
    <div id="grammarFeedback"></div>
    <div id="vocabFeedback"></div>
</div>

</div>

<script>
const writingBox = document.getElementById('writingBox');
const counter = document.getElementById('counter');
const feedbackArea = document.getElementById('feedbackArea');

// Word counter
writingBox.addEventListener('input', () => {
    const words = writingBox.value.trim().split(/\s+/).filter(w => w.length > 0).length;
    counter.innerText = "Words: " + words;
});

// ===== EVALUATION FUNCTIONS =====

function evaluateGrammar(text) {
    let score = 5;
    let feedback = [];

    if (/\bI\s+wakes\b/i.test(text)) {
        score -= 2;
        feedback.push("Incorrect verb: 'I wakes'");
    }

    if (/\bgo school\b/i.test(text)) {
        score -= 1;
        feedback.push("Missing 'to' → 'go to school'");
    }

    if (/\bI am go\b/i.test(text)) {
        score -= 2;
        feedback.push("Wrong structure → 'I go'");
    }

    if (!/\b(and|but|because)\b/i.test(text)) {
        score -= 1;
        feedback.push("Use connectors");
    }

    return { score: Math.max(score,0), feedback };
}

function evaluateLexis(words) {
    let score = 5;
    let feedback = [];

    const unique = new Set(words);

    if (unique.size < 15) {
        score -= 2;
        feedback.push("Limited vocabulary");
    }

    if (!words.includes("school") && !words.includes("home")) {
        score -= 2;
        feedback.push("Missing topic vocabulary");
    }

    return { score: Math.max(score,0), feedback };
}

function evaluateTask(text, count) {
    let score = 5;
    let feedback = [];

    if (count < 40 || count > 60) {
        score -= 2;
        feedback.push("Incorrect word count");
    }

    if (!/\b(I wake|I go|I eat|I study)\b/i.test(text)) {
        score -= 2;
        feedback.push("Not clearly a routine");
    }

    if (!/\b(morning|afternoon|night)\b/i.test(text)) {
        score -= 1;
        feedback.push("Missing time expressions");
    }

    return { score: Math.max(score,0), feedback };
}

function getLevel(score) {
    if (score >= 13) return "B1";
    if (score >= 9) return "A2";
    return "A1";
}

// ===== MAIN FUNCTION =====

function analyzeTask() {
    const text = writingBox.value.trim();
    const words = text.toLowerCase()
        .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"")
        .split(/\s+/)
        .filter(w => w.length > 0);

    const count = words.length;

    if (count < 5) return alert("Write more");

    const g = evaluateGrammar(text);
    const l = evaluateLexis(words);
    const t = evaluateTask(text, count);

    const total = g.score + l.score + t.score;
    const level = getLevel(total);

    let gHTML = "<h3>Grammar: " + g.score + "/5</h3><ul>";
    g.feedback.forEach(f => gHTML += "<li class='tag-error'>"+f+"</li>");
    if (!g.feedback.length) gHTML += "<li class='tag-success'>Good control</li>";
    gHTML += "</ul>";

    let vHTML = "<h3>Lexis: " + l.score + "/5</h3><ul>";
    l.feedback.forEach(f => vHTML += "<li class='tag-error'>"+f+"</li>");
    if (!l.feedback.length) vHTML += "<li class='tag-success'>Good vocabulary</li>";
    vHTML += "</ul>";

    vHTML += "<h3>Task: " + t.score + "/5</h3><ul>";
    t.feedback.forEach(f => vHTML += "<li class='tag-error'>"+f+"</li>");
    if (!t.feedback.length) vHTML += "<li class='tag-success'>Task achieved</li>";
    vHTML += "</ul>";

    vHTML += "<h3>Total: " + total + "/15</h3>";
    vHTML += "<h2>Level: " + level + "</h2>";

    document.getElementById('grammarFeedback').innerHTML = gHTML;
    document.getElementById('vocabFeedback').innerHTML = vHTML;

    document.getElementById('overallStatus').innerText = "Result: " + level;

    feedbackArea.style.display = "block";
}
</script>

</body>
</html>
