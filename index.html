<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluador de Producción Escrita A2</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --white: #ffffff;
            --success: #27ae60;
            --warning: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--bg);
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        h1 { margin: 0; color: var(--primary); font-size: 1.8rem; }
        p.subtitle { color: #7f8c8d; margin-top: 5px; }

        .prompt-box {
            background: #eef2f3;
            padding: 20px;
            border-left: 5px solid var(--accent);
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .writing-area {
            position: relative;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            font-size: 1.1rem;
            resize: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #636e72;
        }

        .btn-evaluar {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.3s;
        }

        .btn-evaluar:hover { background-color: #1a252f; }

        #results {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .feedback-card {
            border: 1px solid #dcdde1;
            border-radius: 8px;
            padding: 20px;
            margin-top: 15px;
        }

        .score-pill {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .high { background-color: var(--success); }
        .mid { background-color: var(--warning); }
        .low { background-color: #e74c3c; }

        .tag {
            background: #eee;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Writing Assessment Tool</h1>
        <p class="subtitle">Nivel A2 - Producción Escrita</p>
    </header>

    <main>
        <div class="prompt-box">
            <strong>Consigna:</strong><br>
            "Describe tu rutina diaria y tus pasatiempos favoritos. Escribe entre 60 y 100 palabras usando conectores como 'and', 'but', 'because' y 'then'."
        </div>

        <div class="writing-area">
            <textarea id="studentWriting" placeholder="Comienza a escribir aquí..."></textarea>
            <div class="stats">
                <span>Palabras: <span id="wordCount">0</span></span>
                <span>Caracteres: <span id="charCount">0</span></span>
            </div>
        </div>

        <button class="btn-evaluar" onclick="evaluarTexto()">Finalizar y Evaluar</button>

        <section id="results">
            <h2>Retroalimentación Educativa</h2>
            <div id="feedbackContent"></div>
        </section>
    </main>
</div>

<script>
    const textarea = document.getElementById('studentWriting');
    const wordCountSpan = document.getElementById('wordCount');
    const charCountSpan = document.getElementById('charCount');

    // Actualización en tiempo real
    textarea.addEventListener('input', () => {
        const text = textarea.value.trim();
        const words = text ? text.split(/\s+/).length : 0;
        wordCountSpan.innerText = words;
        charCountSpan.innerText = text.length;
    });

    function evaluarTexto() {
        const text = textarea.value.trim();
        const words = text ? text.split(/\s+/).length : 0;
        const resultsDiv = document.getElementById('results');
        const feedbackContent = document.getElementById('feedbackContent');
        
        if (words < 5) {
            alert("Por favor, escribe un poco más antes de evaluar.");
            return;
        }

        // Análisis Lingüístico Básico A2
        const conectores = ['and', 'but', 'because', 'then', 'so', 'first', 'after'];
        const encontrados = conectores.filter(c => text.toLowerCase().includes(c));
        
        // Lógica de puntuación (Sencilla para fines educativos)
        let score = 0;
        let feedbackHTML = '';

        // 1. Longitud (Rango ideal 60-100)
        let scoreLongitud = 0;
        if (words >= 60 && words <= 110) scoreLongitud = 100;
        else if (words > 30) scoreLongitud = 60;
        else scoreLongitud = 30;

        // 2. Cohesión (Uso de conectores)
        let scoreCohesion = (encontrados.length / 4) * 100;
        if (scoreCohesion > 100) scoreCohesion = 100;

        const promedio = (scoreLongitud + scoreCohesion) / 2;
        let nivelClase = promedio >= 80 ? 'high' : (promedio >= 50 ? 'mid' : 'low');
        let nivelTexto = promedio >= 80 ? 'Excelente trabajo' : (promedio >= 50 ? 'Buen intento' : 'Necesitas practicar más');

        feedbackHTML = `
            <div class="feedback-card">
                <span class="score-pill ${nivelClase}">${nivelTexto} (${Math.round(promedio)}/100)</span>
                
                <p><strong>Análisis de Extensión:</strong> Has escrito ${words} palabras. 
                ${words < 60 ? 'Intenta expandir un poco más tus ideas para llegar al rango solicitado.' : '¡Muy bien! Cumples con la extensión requerida.'}</p>
                
                <p><strong>Uso de Conectores:</strong> Identificamos ${encontrados.length} conectores básicos: 
                ${encontrados.length > 0 ? encontrados.map(t => `<span class="tag">${t}</span>`).join('') : 'No se detectaron conectores básicos.'}</p>
                
                <p style="margin-top:15px; font-style: italic; color: #666;">
                    * Recordatorio pedagógico: En el nivel A2, lo más importante es que tus oraciones estén conectadas de forma sencilla y clara.
                </p>
            </div>
            <button class="btn-evaluar" style="background:#7f8c8d" onclick="location.reload()">Reiniciar Prueba</button>
        `;

        feedbackContent.innerHTML = feedbackHTML;
        resultsDiv.style.display = 'block';
        resultsDiv.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
